name: AOW2-Online CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: chmod +x gradlew && ./gradlew build --no-daemon
      - name: Test
        run: ./gradlew test --no-daemon