version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    container_name: aow2-server
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/aow2
      SPRING_DATASOURCE_USERNAME: aow2
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-aow2_dev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-aow2_redis}
      AOW2_JWT_SECRET: ${AOW2_JWT_SECRET:-aow2_jwt_dev_secret_change_in_production}
      AOW2_JWT_EXPIRATION_MS: 86400000
      AOW2_GAME_TICK_RATE: 60
      AOW2_MAX_PLAYERS_PER_MATCH: 2
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 --enable-preview"
    volumes:
      - replay-data:/app/replays
      - map-uploads:/app/uploads/maps
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: aow2-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aow2
      POSTGRES_USER: aow2
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aow2_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aow2 -d aow2"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aow2-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-aow2_redis} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aow2_redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  replay-data:
    driver: local
  map-uploads:
    driver: local
