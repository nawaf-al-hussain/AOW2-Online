server:
  port: 8080

spring:
  application:
    name: aow2-server
  datasource:
    url: jdbc:postgresql://localhost:5432/aow2
    username: ${DB_USERNAME:aow2}
    password: ${DB_PASSWORD:aow2_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

aow2:
  cors:
    allowed-origins: ${AOW2_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  jwt:
    secret: ${AOW2_JWT_SECRET:aow2-dev-only-secret-key-that-is-at-least-32-bytes-long-for-hmac}
    expiration-ms: 86400000
  matchmaking:
    initial-elo-range: ${AOW2_MATCHMAKING_INITIAL_ELO_RANGE:100}
    max-elo-range: ${AOW2_MATCHMAKING_MAX_ELO_RANGE:500}

logging:
  level:
    com.aow2: DEBUG
    org.springframework.security: WARN
