server:
  port: 8080

spring:
  application:
    name: aow2-server
  datasource:
    url: jdbc:postgresql://localhost:5432/aow2
    username: aow2
    password: aow2_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.aow2: DEBUG
    org.springframework.security: WARN
