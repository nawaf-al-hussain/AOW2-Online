spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    user:
      name: test
      password: test

aow2:
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long-for-testing
    expiration: 86400000
